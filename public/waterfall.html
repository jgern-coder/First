<script>
const e=React.createElement;
const {useState,useEffect,useRef}=React;

// Format dollars with commas
const fmt$=v=>"$"+Number(v||0).toLocaleString("en-US",{maximumFractionDigits:0});
const fmtP=v=>Number(v||0).toFixed(1)+"%";
const fmtM=v=>{if(Math.abs(v)>=1e6)return '$'+(v/1e6).toFixed(2)+'M';if(Math.abs(v)>=1e3)return '$'+(v/1e3).toFixed(0)+'K';return fmt$(v);};
// Format member counts (no dollar sign)
const fmtN=v=>{if(Math.abs(v)>=1e6)return (v/1e6).toFixed(2)+'M';if(Math.abs(v)>=1e3)return (v/1e3).toFixed(0)+'K';return Number(v||0).toLocaleString("en-US",{maximumFractionDigits:0});};

// Comma-formatted number input
function NumInput({value,onChange,prefix,suffix,info,min,max,step,label}){
  const [display,setDisplay]=useState(value===0?'':Number(value).toLocaleString('en-US'));
  const [focused,setFocused]=useState(false);
  useEffect(()=>{
    if(!focused)setDisplay(value===0?'':Number(value).toLocaleString('en-US'));
  },[value,focused]);
  const handleChange=ev=>{
    const raw=ev.target.value.replace(/,/g,'');
    setDisplay(ev.target.value);
    const n=parseFloat(raw)||0;
    onChange(n);
  };
  const handleFocus=ev=>{setFocused(true);setDisplay(value===0?'':String(value));};
  const handleBlur=()=>{setFocused(false);setDisplay(value===0?'':Number(value).toLocaleString('en-US'));};
  return e('div',{className:'field'},
    e('label',null,label,info?e(InfoBtn,{text:info}):null),
    e('div',{className:'input-wrap'},
      prefix?e('span',{className:'input-affix input-pre'},prefix):null,
      e('input',{type:'text',inputMode:'numeric',value:display,placeholder:'0',
        onChange:handleChange,onFocus:handleFocus,onBlur:handleBlur,
        style:{flex:1,padding:'8px 12px',fontSize:14,border:'none',outline:'none',background:'white',width:'100%'}}),
      suffix?e('span',{className:'input-affix input-suf'},suffix):null
    )
  );
}

function PctInput({value,onChange,label,info,min,max,step}){
  return e('div',{className:'field'},
    e('label',null,label,info?e(InfoBtn,{text:info}):null),
    e('div',{className:'input-wrap'},
      e('input',{type:'number',value,min:min||0,max:max||100,step:step||0.1,
        onChange:ev=>onChange(parseFloat(ev.target.value)||0),
        style:{flex:1,padding:'8px 12px',fontSize:14,border:'none',outline:'none',background:'white',width:'100%'}}),
      e('span',{className:'input-affix input-suf'},'%')
    )
  );
}

// ── SHARED TOOLTIP LIBRARY (sourced from Inputs sheet column A comments) ──────
const TIPS={
  distFee:"Major studios and independent distributors typically charge a distribution fee of 25–40%, taken off the top before expense recoupment. Angel does not charge a distribution fee — instead, we align with filmmakers and investors at the bottom of the waterfall, sharing both losses and wins (two-thirds to filmmakers, one-third to Angel).",
  hardCosts:"Ticketing API, theatrical booking software & consultants, ticket redemptions, vendor payment automation, and distribution travel supporting theatrical premieres. Based on past Angel releases, average theatrical distribution costs are about $75 per screen.",
  taxes:"Ticket Sales and Entertainment Taxes reflect a blended average of sales and entertainment taxes across the United States. Actual rates vary by jurisdiction.",
  exhibitor:"The exhibitor (theater chain) retains 55% of net-of-tax box office gross to cover operating costs, rent, and profit.",
  pna:"P&A (prints & advertising) is a fixed, recoupable marketing expense. It typically comes out to ≈ 35–55% of domestic box office, but always includes a minimum spend (e.g., $3M). If a film underperforms, that fixed spend can represent a much larger share of revenue.",
  costOfCapital:"P&A Capital Cost reflects the financing premium owed to crowd-fund investors who front the P&A spend. Typically 10–15% of the P&A amount.",
  ibo:"Based on historical performance, especially for faith-based titles, international box office has generally been limited compared to domestic. In most cases, faith-based releases have earned less than 5% of their domestic box office overseas. For that reason, users should not rely on broad industry averages when entering assumptions in this category.",
  revShare:"The distributor's share of net revenue after P&A recoupment. Other distributors typically take 40–100%. Angel takes 33.3% (one-third), with the filmmaker receiving two-thirds.",
  pvod:"Early digital rentals/purchases (18–45 days), incl. Premium EST (early digital ownership) and MVPD premium on-demand (i.e. cable/satellite platforms). Not all releases qualify — at discretion of platforms like Apple, Amazon, Fandango.",
  pvod_plat:"Digital advertising to extend theatrical momentum, platform placement fees, delivery costs.",
  tvod_new:"Standard-priced rentals and purchases during the new-release window, including EST via Apple TV, Amazon, Google Play, etc., as well as MVPD (Multichannel Video Programming Distributor) VOD/PPV services (e.g., Comcast Xfinity, DirecTV).",
  tvod_cat:"Lower-priced rentals and purchases of catalog/library titles outside the new-release window, including EST via Apple TV, Amazon, Google Play, etc., as well as MVPD (Multichannel Video Programming Distributor) VOD/PPV services (e.g., Comcast Xfinity, DirecTV).",
  tvod_cat_mktg:"Minimal servicing, metadata updates, encoding. No incremental marketing.",
  packaged:"DVD/Blu-ray sales through retail and e-commerce outlets (e.g. Walmart, Amazon).",
  packaged_retail:"Manufacturing, shipping, warehousing, retailer margins/returns. Modest marketing if any.",
  pay1:"First exclusive subscription window following theatrical and transactional release. Typically a high-value flat license fee paid by a top SVOD or premium cable partner (Netflix, Disney+, Peacock, Max, Starz). Runs 12–18 months and is usually the most valuable post-theatrical subscription deal.",
  pay1_mktg:"Technical servicing (encoding, QC, captions, metadata) plus incremental marketing tied to the Pay 1 launch.",
  pay1_dist:"Commission retained by distributor from the license fee.",
  dist_pvod:"20–30% of receipts after platform split.",
  dist_tvod:"20–30% of receipts after the platform split.",
  dist_packaged:"25–35% after retailer split.",
  dist_pay1:"20–30% of license fee.",
  dist_pay2:"20–30% after platform split.",
  dist_avod:"20–30% after platform split.",
  dist_freetv:"20–30% after platform split.",
  dist_nontheat:"25–35% of gross receipts.",
  dist_intl:"25–35% of gross receipts.",
  pay2:"Follow-up subscription window that begins after Pay 1 exclusivity expires. Typically non-exclusive and sold to secondary SVOD or premium cable partners (Amazon Prime, Hulu, Paramount+, Starz, etc.). Paid as a flat license fee, usually at a lower value than Pay 1.",
  pay2_del:"Encoding, Q.C., Conforming Subtitles, dubbing servicing, and in some cases fees for promotional placement.",
  avod:"AVOD – Advertising Video on Demand: on-demand content free to users, monetized through advertising (e.g., Tubi, Roku, Freevee, YouTube).\n\nFAST – Free Ad-Supported Streaming Television: linear channels that play continuously like live TV, supported by ads (e.g., Pluto TV, Samsung TV Plus, Plex).\n\nRevenue comes from advertising, split between the platform and distributor. Typically non-exclusive and positioned after Pay 1/Pay 2.",
  avod_plat:"Percentage the platform retains from ad revenue before distributor participation (typically 30–50%).",
  avod_del:"Technical and servicing expenses to deliver and maintain assets on AVOD/FAST platforms.",
  freetv:"Late-window license to broadcast networks or syndicators (ABC, NBC, CBS, Fox, or international broadcasters). Paid as a flat license fee rather than ad share. Typically much lower in value than Pay 1 or Pay 2, but still generates incremental revenue.",
  freetv_del:"Technical prep costs to create broadcast-ready versions (standards edits, captions, dubs, metadata, file delivery).",
  nontheat:"Airlines, educational, corporate, military, and specialty licensing. Typically smaller flat-fee deals that provide supplemental revenue.",
  nontheat_del:"Contracting and delivery to airlines, education, or specialty buyers.",
  intl:"Distribution or licensing of rights outside the US/Canada — including digital, TV, streaming, and ancillary exploitation. Typically handled territory by territory through international distributors or sales agents, with deductions for distribution fees and sales/delivery overhead (e.g., subtitling, dubbing, QC).",
  intl_del:"Delivery, subtitling, dubbing, and sometimes light territory-specific sales/servicing & commissions.",
  tam:"Upper bound of the membership model. For reference, subscriber counts by platform (late 2025, approximate): Netflix – 301.6M, JioHotstar – 280M, Disney+ (combined) – 207.4M, Amazon Prime Video – 205M, Max (HBO) – 97M, Paramount+ – 60M, Apple TV+ – 45M, Peacock – 36M.",
  exclusive:"Term where Angel has SVOD exclusivity. Filmmaker share is doubled during the exclusive SVOD term.",
  viewDecay:"Viewership decays each month after the first two months as the title ages in the catalog.",
};

// Helper: label with inline ⓘ icon
function TipLabel({text,tip,style,small}){
  return e('span',{style:{display:'inline-flex',alignItems:'center',gap:4,...(style||{})}},
    text,
    tip&&e(InfoBtn,{text:tip,small})
  );
}

function InfoBtn({text,small}){
  const [open,setOpen]=useState(false);
  return e('span',{className:'tooltip'},
    e('button',{className:small?'info-btn-sm':'info-btn',onClick:(ev)=>{ev.stopPropagation();setOpen(o=>!o)}},'i'),
    e('div',{className:'tooltip-box'+(open?' open':'')},
      text,
      e('button',{onClick:()=>setOpen(false),style:{display:'block',marginTop:8,color:'#2563eb',textDecoration:'underline',background:'none',border:'none',cursor:'pointer',fontSize:12}},'Close')
    )
  );
}

const SECTIONS=["Project Basics","Distributor Terms","Post-Theatrical","Angel Guild","SVOD Schedule","Results"];

function Expandable({title,icon,children,defaultOpen,forceOpen}){
  const [open,setOpen]=useState(!!defaultOpen);
  const isOpen=forceOpen||open;
  return e('div',null,
    e('button',{className:'expand-btn no-print',onClick:()=>setOpen(o=>!o)},
      e('span',null,icon,' ',title),
      e('span',{style:{fontSize:16,color:'#9ca3af'}},isOpen?'▲':'▼')
    ),
    isOpen&&e('div',{className:'expand-content'},children)
  );
}

// ── EXACT WATERFALL CALCULATION matching the Inputs sheet ──────────────────
function calcAll(p){
  const {gDBO,screens,pna,gIBO,revShare,mg,
    pI,pP,pD,pM, tI,tP,tD,tM, t2I,t2P,t2D,t2M,
    pkI,pkR,pkD,pkO, p1I,p1D,p1M, p2I,p2D,p2S,
    aI,aP,aD,aDl, fI,fD,fDl, nI,nD,nDl, iI,iD,iDl,
    vPct,gMbr,gRate,aAdj,mCeil,termQtrs,eQtrs,vDec,vF1,vF2,budget}=p;

  // ── THEATRICAL ──
  const tax_rate=0.05, exhib_rate=0.55;
  const tax=gDBO*tax_rate;
  const netOfTax=gDBO-tax;
  const exhibitor=netOfTax*exhib_rate;
  const distGross=netOfTax-exhibitor;
  const distFeeOther=distGross*0.40;
  const hardCosts=screens*75;
  const netDBO_other=distGross-distFeeOther-hardCosts;
  const netDBO_angel=distGross-hardCosts; // no dist fee

  const iboTax=gIBO*0.80;
  const netIBO=gIBO-iboTax;

  const worldwide_other=netDBO_other+netIBO;
  const worldwide_angel=netDBO_angel+netIBO;

  const pnaCost=pna*0.125; // cost of capital
  const netAfterPnA_other=worldwide_other-pna-pnaCost;
  const netAfterPnA_angel=worldwide_angel-pna-pnaCost;

  const distShare_other=Math.max(0,netAfterPnA_other)*(revShare/100);
  const distShare_angel=Math.max(0,netAfterPnA_angel)*0.333;
  const thFilm_other=Math.max(0,netAfterPnA_other)-distShare_other;
  const thFilm_angel=Math.max(0,netAfterPnA_angel)-distShare_angel;

  // ── POST-THEATRICAL window helper ──
  // For Other: gross * (1-plat) * (1-distFee) * (1-mktg) * (1-revShare)
  // For Angel: gross * (1-plat) * (1-mktg)  [no dist fee, no rev share deduction same structure]
  // Actually from sheet: Angel has same formula but distFee=0, and final rev share is also Angel's 33.3%
  // Looking at sheet row 61: same distributor rev share row applies to both columns
  // But wait - Angel's post-theatrical filmmaker share is ~2x Other → that's because:
  //   Other: takes distFee + 50% rev share; Angel: no distFee + 33.3% rev share
  // So the formula is: net_per_window * (1 - revShare%) for Other, net_per_window * (1-0.333) for Angel

  // mktgOnGrossAngel: some windows apply mktg% to gross for Angel but aftPlat for Other (e.g. TVOD Cat: H34=H31*C34 vs F34=(F31+F32)*C34)
  const win=(incPct,platPct,distFeePct,mktgPct,mktgOnGrossAngel=false)=>{
    const gross=(incPct/100)*gDBO;
    const platCost=gross*(platPct/100);
    const aftPlat=gross-platCost;
    const distCostOther=aftPlat*(distFeePct/100);
    const mktgCostOther=aftPlat*(mktgPct/100);                          // Other always uses aftPlat
    const mktgCostAngel=(mktgOnGrossAngel?gross:aftPlat)*(mktgPct/100); // Angel uses gross for TVOD Cat
    const netOther=aftPlat-distCostOther-mktgCostOther;
    const netAngel=aftPlat-mktgCostAngel;
    return{gross,platCost,distCostOther,mktgCostOther,mktgCostAngel,netOther,netAngel};
  };

  const windows=[
    {name:'Premium Digital (PVOD/PEST)',range:'0–50% of DBO',tip:TIPS.pvod,
     platTip:TIPS.pvod_plat,distTip:TIPS.dist_pvod,mktgTip:'Digital advertising to extend theatrical momentum, platform placement fees, delivery costs.',
     w:win(pI,pP,pD,pM)},
    {name:'TVOD – New Release (Digital & MVPD)',range:'0–17% of DBO',tip:TIPS.tvod_new,
     platTip:'Digital advertising to extend theatrical momentum, platform placement fees, delivery costs.',distTip:TIPS.dist_tvod,mktgTip:'Marketing and servicing costs during the new-release window.',
     w:win(tI,tP,tD,tM)},
    {name:'TVOD – Catalog (Digital & MVPD)',range:'0–10% of DBO',tip:TIPS.tvod_cat,
     platTip:null,distTip:TIPS.dist_tvod,mktgTip:TIPS.tvod_cat_mktg,
     w:win(t2I,t2P,t2D,t2M,true)},
    {name:'Packaged Media',range:'0–10% of DBO',tip:TIPS.packaged,
     platTip:TIPS.packaged_retail,distTip:TIPS.dist_packaged,mktgTip:TIPS.packaged_retail,
     w:win(pkI,pkR,pkD,pkO)},
    {name:'Pay 1 Window (Exclusive SVOD/Pay-TV)',range:'0–25% of DBO',tip:TIPS.pay1,
     platTip:null,distTip:TIPS.dist_pay1,mktgTip:TIPS.pay1_mktg,
     w:win(p1I,0,p1D,p1M)},
    {name:'Pay 2 Window (Secondary SVOD/Pay-TV)',range:'0–15% of DBO',tip:TIPS.pay2,
     platTip:null,distTip:TIPS.dist_pay2,mktgTip:TIPS.pay2_del,
     w:win(p2I,0,p2D,p2S)},
    {name:'AVOD / FAST',range:'0–15% of DBO',tip:TIPS.avod,
     platTip:TIPS.avod_plat,distTip:TIPS.dist_avod,mktgTip:TIPS.avod_del,
     w:win(aI,aP,aD,aDl)},
    {name:'Free TV / Syndication',range:'0–10% of DBO',tip:TIPS.freetv,
     platTip:null,distTip:TIPS.dist_freetv,mktgTip:TIPS.freetv_del,
     w:win(fI,0,fD,fDl)},
    {name:'Non-Theatrical / Ancillary',range:'0–12% of DBO',tip:TIPS.nontheat,
     platTip:null,distTip:TIPS.dist_nontheat,mktgTip:TIPS.nontheat_del,
     w:win(nI,0,nD,nDl)},
    {name:'International',range:'0–35% of DBO',tip:TIPS.intl,
     platTip:null,distTip:TIPS.dist_intl,mktgTip:TIPS.intl_del,
     w:win(iI,0,iD,iDl)},
  ];

  const ptNetOther=windows.reduce((s,x)=>s+x.w.netOther,0);
  const ptNetAngel=windows.reduce((s,x)=>s+x.w.netAngel,0);

  // P&A carryforward into post-theatrical (if theatrical didn't fully recoup)
  // Sheet row 59: pnaCarryforward is negative (it's the unrecouped amount as a negative number)
  // Sheet row 60: ptAfterPnA = ptNet + pnaCarryforward (F58+F59)
  // Sheet row 61: IF(ptAfterPnA <= 0, 0, -(ptAfterPnA * revShare%))
  const pnaCarry_other = netAfterPnA_other < 0 ? netAfterPnA_other : 0; // negative or 0
  const pnaCarry_angel = netAfterPnA_angel < 0 ? netAfterPnA_angel : 0;
  const pnaUnrecouped_other = Math.abs(pnaCarry_other); // positive magnitude (for display)
  const pnaUnrecouped_angel = Math.abs(pnaCarry_angel);
  const ptAfterPnA_other = ptNetOther + pnaCarry_other; // = ptNetOther - unrecouped
  const ptAfterPnA_angel = ptNetAngel + pnaCarry_angel;

  // Rev share only applies if ptAfterPnA > 0 (exact sheet IF logic)
  const ptDistShare_other = ptAfterPnA_other <= 0 ? 0 : ptAfterPnA_other * (revShare / 100);
  const ptDistShare_angel = ptAfterPnA_angel <= 0 ? 0 : ptAfterPnA_angel * 0.333;
  const ptFilm_other = Math.max(0, ptAfterPnA_other) - ptDistShare_other;
  const ptFilm_angel = Math.max(0, ptAfterPnA_angel) - ptDistShare_angel;

  // ── ANGEL SVOD ── (exact Back End sheet formulas)
  const _v0=vPct/100,_vf1=vF1/100,_vf2=vF2/100,_vd=vDec/100;
  let mbr=gMbr,str=0;
  let svodY1=0,svodY2=0,svodY3=0,svodY410=0;
  const termMos=termQtrs*3;
  for(let m=1;m<=120;m++){
    if(m>1){
      const adj=Math.pow(1+aAdj/100,Math.floor((m-2)/12));
      mbr=Math.min(mbr+mbr*gRate/100*adj*(1-mbr/mCeil),mCeil);
    }
    if(m>termMos){continue;} // blank months beyond term
    let cv;
    if(m<=2)cv=_v0;
    else if(m<=60)cv=Math.max(_vf1,(_v0-_vf1)*Math.pow(1-_vd,m-2)+_vf1);
    else{const v60=Math.max(_vf1,(_v0-_vf1)*Math.pow(1-_vd,58)+_vf1);cv=Math.max(_vf2,(v60-_vf2)*Math.pow(1-_vd,m-60)+_vf2);}
    const base=mbr*1.75*cv;
    const termVal=m<=eQtrs*3?2:1;
    const mo=base*termVal;
    str+=mo;
    if(m<=12)svodY1+=mo;else if(m<=24)svodY2+=mo;else if(m<=36)svodY3+=mo;else svodY410+=mo;
  }

  // P&A carry into SVOD: any P&A still unrecouped after post-theatrical comes out of SVOD
  // Sheet row 78: =IF(ptNet >= pnaUnrecouped, 0, pnaUnrecouped - ptNet)
  const svodPnaCarry_other = Math.max(0, pnaUnrecouped_other - ptNetOther);
  const svodPnaCarry_angel = Math.max(0, pnaUnrecouped_angel - ptNetAngel);
  const svodFilm_angel = Math.max(0, str - svodPnaCarry_angel);

  const total_other=thFilm_other+ptFilm_other-mg;
  const total_angel=thFilm_angel+ptFilm_angel+svodFilm_angel;

  // Total dist fees for Other
  const totalDistFees_other=distFeeOther+windows.reduce((s,x)=>s+x.w.distCostOther,0);

  return{
    // Theatrical detail
    tax,netOfTax,exhibitor,distGross,
    distFeeOther,hardCosts,
    netDBO_other,netDBO_angel,
    iboTax,netIBO,
    worldwide_other,worldwide_angel,
    pna,pnaCost,
    netAfterPnA_other,netAfterPnA_angel,
    distShare_other,distShare_angel,
    thFilm_other,thFilm_angel,
    // Post-theatrical
    windows,ptNetOther,ptNetAngel,
    pnaUnrecouped_other,pnaUnrecouped_angel,
    ptAfterPnA_other,ptAfterPnA_angel,
    ptDistShare_other,ptDistShare_angel,
    ptFilm_other,ptFilm_angel,
    // SVOD
    str,svodFilm_angel,svodPnaCarry_angel,svodPnaCarry_other,svodY1,svodY2,svodY3,svodY410,
    // Totals
    total_other,total_angel,
    pO:budget>0?(total_other/budget)*100:0,
    pA:budget>0?(total_angel/budget)*100:0,
    totalDistFees_other,
    // Membership milestones
    gMbr_final:mbr
  };
}

function calcMilestones(gMbr,gRate,aAdj,mCeil){
  let mbr=gMbr;const ms={1:gMbr};
  for(let m=1;m<=120;m++){
    if(m>1){const adj=Math.pow(1+aAdj/100,Math.floor((m-2)/12));mbr=Math.min(mbr+mbr*gRate/100*adj*(1-mbr/mCeil),mCeil);}
    if([12,24,36,60,120].includes(m))ms[m]=mbr;
  }
  return ms;
}

// ── SVOD SCHEDULE SECTION ─────────────────────────────────────────────────────
function SvodScheduleSection({vPct,gMbr,gRate,aAdj,mCeil,termQtrs,eQtrs,vDec,vF1,vF2}){
  // Rebuild full 120-month simulation row by row
  const rows=[];
  const v0=vPct/100,vf1=vF1/100,vf2=vF2/100,vd=vDec/100;
  let mbr=gMbr,running=0;
  const exclusiveMos=eQtrs*3;
  const termMos=termQtrs*3;
  for(let m=1;m<=120;m++){
    if(m>1){
      const adj=Math.pow(1+aAdj/100,Math.floor((m-2)/12));
      mbr=Math.min(mbr+mbr*gRate/100*adj*(1-mbr/mCeil),mCeil);
    }
    const beyondTerm=m>termMos;
    let cv;
    if(m<=2)cv=v0;
    else if(m<=60)cv=Math.max(vf1,(v0-vf1)*Math.pow(1-vd,m-2)+vf1);
    else{const v60=Math.max(vf1,(v0-vf1)*Math.pow(1-vd,58)+vf1);cv=Math.max(vf2,(v60-vf2)*Math.pow(1-vd,m-60)+vf2);}
    const residuals=beyondTerm?0:mbr*1.75*cv;
    const termVal=beyondTerm?0:(m<=exclusiveMos?2:1);
    const bonus=termVal===2?residuals:0;
    const total=residuals+bonus;
    running+=total;
    const qtr=Math.ceil(m/3);
    const yr=Math.ceil(m/12);
    const atCeil=mbr>=mCeil*0.999;
    rows.push({m,yr,qtr,mbr,cv,residuals,bonus,total,running,termVal,atCeil,beyondTerm});
  }

  // Year summaries
  const years={};
  rows.forEach(r=>{
    if(!years[r.yr])years[r.yr]={yr:r.yr,total:0,endMbr:0,endCv:0};
    years[r.yr].total+=r.total;
    years[r.yr].endMbr=r.mbr;
    years[r.yr].endCv=r.cv;
  });

  const termLabel=v=>v===2?'Exclusive':v===1?'Non-Exclusive':'—';
  const termColor=v=>v===2?{background:'#dbeafe',color:'#1d4ed8'}:v===1?{background:'#dcfce7',color:'#15803d'}:{background:'#f3f4f6',color:'#d1d5db'};

  const [showAll,setShowAll]=React.useState(false);
  const displayRows=showAll?rows:rows.filter(r=>r.m<=24||(r.m%3===0&&r.m<=60)||r.m%12===0);

  const grandTotal=rows[rows.length-1].running;

  return e('div',null,
    e('h2',null,'Angel Guild SVOD — Monthly Schedule'),
    e('p',{style:{fontSize:14,color:'#6b7280',marginBottom:12}},
      'Month-by-month projection of Angel Guild streaming residuals over the 10-year term, based on your inputs.'),

    // Summary strip
    e('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:20}},
      [{label:'Term Length',val:termQtrs+' quarters',sub:(termQtrs*3)+' months total'},
       {label:'Exclusive Term',val:eQtrs+' quarters',sub:(exclusiveMos)+' months'},
       {label:'10-Year Total',val:fmt$(grandTotal),sub:'Filmmaker share'},
       {label:'TAM Ceiling',val:fmtN(mCeil),sub:'Upper bound'},
      ].map(({label,val,sub})=>
        e('div',{key:label,style:{background:'#f0f9ff',border:'1px solid #bae6fd',borderRadius:8,padding:'10px 14px'}},
          e('div',{style:{fontSize:11,color:'#0369a1',fontWeight:600,marginBottom:2}},label),
          e('div',{style:{fontSize:16,fontWeight:700,color:'#111827'}},val),
          e('div',{style:{fontSize:11,color:'#6b7280'}},sub)
        )
      )
    ),

    // ── Scenario Table (Low / Baseline / High) ──
    e('div',{style:{marginBottom:20}},
      e('div',{style:{fontSize:13,fontWeight:600,color:'#374151',marginBottom:8}},'Filmmaker Payout Scenarios'),
      e('p',{style:{fontSize:12,color:'#6b7280',marginBottom:10}},'Low (0.5×), Baseline, and High (1.5×) viewership scenarios based on your inputs.'),
      e('div',{style:{overflowX:'auto'}},
        e('table',{className:'svod-table'},
          e('thead',null,e('tr',null,
            e('th',{style:{textAlign:'left'}},'Scenario'),
            e('th',null,'Year 1'),e('th',null,'Year 2'),e('th',null,'Year 3'),
            e('th',null,'3-Yr Total'),e('th',null,'Yrs 4–10'),e('th',null,'10-Yr Total')
          )),
          e('tbody',null,
            [['svod-low','Low Case',0.5],['svod-base','Baseline',1.0],['svod-high','High Case',1.5]].map(([cls,lbl,mult])=>{
              const y1=rows.filter(r=>r.yr===1).reduce((s,r)=>s+r.total,0)*mult;
              const y2=rows.filter(r=>r.yr===2).reduce((s,r)=>s+r.total,0)*mult;
              const y3=rows.filter(r=>r.yr===3).reduce((s,r)=>s+r.total,0)*mult;
              const y3tot=(y1+y2+y3);
              const y410=rows.filter(r=>r.yr>=4).reduce((s,r)=>s+r.total,0)*mult;
              const tot=y1+y2+y3+y410;
              return e('tr',{key:cls,className:cls},
                e('td',null,lbl),
                e('td',null,fmt$(y1)),e('td',null,fmt$(y2)),e('td',null,fmt$(y3)),
                e('td',null,fmt$(y3tot)),e('td',null,fmt$(y410)),e('td',null,fmt$(tot))
              );
            })
          )
        )
      )
    ),

    // Year summary cards
    e('div',{style:{marginBottom:20}},
      e('div',{style:{fontSize:13,fontWeight:600,color:'#374151',marginBottom:8}},'Annual Summary'),
      e('div',{style:{overflowX:'auto'}},
        e('table',{className:'wf-table',style:{fontSize:12}},
          e('thead',null,e('tr',null,
            e('th',{style:{textAlign:'left'}},'Year'),
            e('th',null,'End Members'),
            e('th',null,'End Viewership %'),
            e('th',null,'Annual Payout'),
            e('th',null,'Running Total'),
          )),
          e('tbody',null,
            Object.values(years).map(({yr,total,endMbr,endCv})=>{
              const yrBeyond=(yr-1)*12+1>termQtrs*3; // all months in this year are beyond term
              const yrPartial=!yrBeyond&&yr*12>termQtrs*3;
              return e('tr',{key:yr,style:{background:yrBeyond?'#f9fafb':yr%2===0?'#f9fafb':'white',opacity:yrBeyond?0.45:1}},
                e('td',{style:{fontWeight:600,color:yrBeyond?'#9ca3af':'inherit'}}, 'Year '+yr+(yrBeyond?' (beyond term)':yrPartial?' (partial)':'')),
                e('td',{style:{color:yrBeyond?'#d1d5db':'inherit'}},yrBeyond?'—':fmtN(endMbr)),
                e('td',{style:{color:yrBeyond?'#d1d5db':'inherit'}},yrBeyond?'—':(endCv*100).toFixed(2)+'%'),
                e('td',{style:{fontWeight:600,color:yrBeyond?'#d1d5db':'#1d4ed8'}},yrBeyond?'—':fmt$(total)),
                e('td',{style:{color:yrBeyond?'#d1d5db':'#6b7280'}},yrBeyond?'—':fmt$(rows.filter(r=>r.yr<=yr).reduce((s,r)=>s+r.total,0)))
              );
            })
          )
        )
      )
    ),

    // Monthly detail table
    e('div',{style:{marginBottom:12,display:'flex',alignItems:'center',justifyContent:'space-between'}},
      e('div',{style:{fontSize:13,fontWeight:600,color:'#374151'}},'Monthly Detail'),
      e('button',{
        onClick:()=>setShowAll(s=>!s),
        style:{fontSize:12,color:'#2563eb',background:'none',border:'1px solid #bfdbfe',borderRadius:6,padding:'4px 10px',cursor:'pointer'}
      },showAll?'Show condensed view':'Show all 120 months')
    ),
    e('div',{style:{overflowX:'auto',maxHeight:480,overflowY:'auto',border:'1px solid #e5e7eb',borderRadius:8}},
      e('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:12}},
        e('thead',null,
          e('tr',{style:{background:'#1e3a5f',color:'white',position:'sticky',top:0,zIndex:2}},
            e('th',{style:{padding:'8px 10px',textAlign:'center',width:50}},'Mo'),
            e('th',{style:{padding:'8px 10px',textAlign:'center',width:40}},'Yr'),
            e('th',{style:{padding:'8px 10px',textAlign:'center',width:40}},'Qtr'),
            e('th',{style:{padding:'8px 10px',textAlign:'right'}},'Members'),
            e('th',{style:{padding:'8px 10px',textAlign:'right'}},'Viewership %'),
            e('th',{style:{padding:'8px 10px',textAlign:'center'}},'Term'),
            e('th',{style:{padding:'8px 10px',textAlign:'right'}},'Residuals'),
            e('th',{style:{padding:'8px 10px',textAlign:'right'}},'Excl. Bonus'),
            e('th',{style:{padding:'8px 10px',textAlign:'right'}},'Monthly Total'),
            e('th',{style:{padding:'8px 10px',textAlign:'right'}},'Running Total'),
          )
        ),
        e('tbody',null,
          displayRows.map((r,i)=>{
            const isYearEnd=r.m%12===0;
            const isYearStart=r.m%12===1&&r.m>1;
            const bt=r.beyondTerm;
            return e('tr',{key:r.m,style:{
              background:bt?'#f9fafb':isYearEnd?'#eff6ff':r.yr%2===0?'#f9fafb':'white',
              borderTop:isYearStart?'2px solid #bfdbfe':'none',
              fontWeight:isYearEnd&&!bt?600:'normal',
              opacity:bt?0.4:1,
            }},
              e('td',{style:{padding:'5px 10px',textAlign:'center',color:'#6b7280'}},r.m),
              e('td',{style:{padding:'5px 10px',textAlign:'center',color:'#6b7280'}},r.yr),
              e('td',{style:{padding:'5px 10px',textAlign:'center',color:'#6b7280'}},'Q'+r.qtr),
              e('td',{style:{padding:'5px 10px',textAlign:'right',color:bt?'#d1d5db':'inherit'}},bt?'—':fmtN(r.mbr)),
              e('td',{style:{padding:'5px 10px',textAlign:'right',color:bt?'#d1d5db':'inherit'}},bt?'—':(r.cv*100).toFixed(2)+'%'),
              e('td',{style:{padding:'5px 10px',textAlign:'center'}},
                bt
                  ? e('span',{style:{background:'#f3f4f6',color:'#d1d5db',borderRadius:4,padding:'2px 7px',fontSize:11,fontWeight:600}},'—')
                  : e('span',{style:{...termColor(r.termVal),borderRadius:4,padding:'2px 7px',fontSize:11,fontWeight:600,whiteSpace:'nowrap'}},termLabel(r.termVal))
              ),
              e('td',{style:{padding:'5px 10px',textAlign:'right',color:bt?'#d1d5db':'inherit'}},bt?'—':fmt$(r.residuals)),
              e('td',{style:{padding:'5px 10px',textAlign:'right',color:bt?'#d1d5db':r.bonus>0?'#1d4ed8':'#d1d5db'}},
                bt?'—':r.bonus>0?fmt$(r.bonus):'—'),
              e('td',{style:{padding:'5px 10px',textAlign:'right',fontWeight:bt?'normal':600,color:bt?'#d1d5db':'inherit'}},bt?'—':fmt$(r.total)),
              e('td',{style:{padding:'5px 10px',textAlign:'right',color:'#6b7280'}},bt?'—':fmt$(r.running)),
            );
          }),
          !showAll&&e('tr',{key:'ellipsis'},
            e('td',{colSpan:10,style:{textAlign:'center',padding:'8px',color:'#9ca3af',fontSize:12,background:'#f9fafb'}},
              '↑ Showing condensed view (quarterly for months 13–60, annual for months 61–120) · Click "Show all 120 months" above to expand'
            )
          )
        )
      )
    ),
    e('p',{style:{fontSize:11,color:'#9ca3af',marginTop:8}},
      '* Residuals = Members × Viewership % × $10 × 33.3% filmmaker share. Exclusivity Bonus doubles the payout during the exclusive term (',eQtrs,' quarters). Term length: ',termQtrs,' quarters (',termQtrs*3,' months). Months beyond the term are shown greyed out with no revenue.')
  );
}

function ResultsSection({r,c,title,budget,gDBO,gIBO,pna,screens,revShare,mg,vPct,gMbr,gRate,aAdj,mCeil,vDec,vF1,vF2,printMode,doPrint,doCSV}){

        dboSource&&e('div',{style:{fontSize:11,color:'#059669',marginTop:-10,marginBottom:8,paddingLeft:2,display:'flex',alignItems:'center',gap:4}},
          e('span',null,'✓'),' Pre-filled from Box Office Projector — ',e('strong',null,dboSource),' scenario'),
        e('div',{style:{textAlign:'right',marginTop:-10,marginBottom:16}},
          e('button',{
            onClick:()=>{
              localStorage.setItem('waterfallBridge',JSON.stringify({budget,title}));
              window.location.href='/';
            },
            style:{fontSize:12,color:'#2563eb',background:'none',border:'none',cursor:'pointer',textDecoration:'underline',padding:0}
          },'📊 Estimate DBO with Box Office Projector →')),
        e(NumInput,{label:'Domestic Screen Count',value:screens,onChange:setScreens,info:'Number of domestic screens. Angel has averaged 2,403 screens per release.'}),
        e(NumInput,{label:'Domestic Prints & Advertising (P&A)',value:pna,onChange:setPna,prefix:'$',info:"P&A (prints & advertising) is a fixed, recoupable marketing expense. It typically comes out to ≈ 35–55% of domestic box office, but always includes a minimum spend (e.g., $3M). If a film underperforms, that fixed spend can represent a much larger share of revenue."}),
        e(NumInput,{label:'Gross International Box Office (IBO)',value:gIBO,onChange:setGIBO,prefix:'$',info:'Based on historical performance, especially for faith-based titles, international box office has generally been limited compared to domestic. In most cases, faith-based releases have earned less than 5% of their domestic box office overseas. For that reason, users should not rely on broad industry averages when entering assumptions in this category.'})
      ),

      // ── STEP 1: DISTRIBUTOR TERMS ──
      mode!=='svod_only'&&step===1&&e('div',null,
        e('h2',null,'Distributor Terms'),
        e('p',{className:'sub'},'Configure terms for a traditional distributor vs. Angel.'),
        e('div',{className:'grid2'},
          e('div',{className:'card card-gray'},
            e('div',{className:'card-label card-label-gray'},'Other Distributors'),
            e(PctInput,{label:'Net Revenue Share %',value:revShare,onChange:setRevShare,info:'Typically 40–100%. Distributor share after P&A recoupment. Major studios and independent distributors typically charge a distribution fee of 25–40%, taken off the top before expense recoupment.',min:0,max:100}),
            e(NumInput,{label:'Recoupable MG',value:mg,onChange:setMg,prefix:'$',info:'Advance paid to filmmaker, recouped before back-end.'})
          ),
          e('div',{className:'card card-blue'},
            e('div',{className:'card-label card-label-blue'},'Angel Studios'),
            e('div',{style:{fontSize:14,marginBottom:8}},e('strong',null,'Back-End Share: '),'33.3%'),
            e('div',{style:{fontSize:14,marginBottom:8}},e('strong',null,'Distribution Fee: '),e('span',{style:{color:'#059669',fontWeight:600}},'$0')),
            e('div',{style:{fontSize:14,marginBottom:8}},e('strong',null,'MG: '),'—'),
            e('div',{style:{fontSize:12,color:'#1d4ed8',lineHeight:1.6,marginTop:12}},'Angel takes no distribution fees and sits beside filmmakers at the bottom of the waterfall. When Angel earns a dollar, the filmmaker earns two.')
          )
        )
      ),

      // ── STEP 2: POST-THEATRICAL ──
      mode!=='svod_only'&&step===2&&e('div',null,
        e('h2',null,'Post-Theatrical Revenue'),
        e('p',{className:'sub'},'Set revenue assumptions for each distribution window.'),
        e('div',{className:'warn',style:{display:'flex',gap:8,alignItems:'flex-start'}},
          e('span',null,'⚠️'),
          e('span',null,e('strong',null,'Illustrative estimates only.'),' Pre-filled "Income as % of DBO" values reflect mid-range industry assumptions — not guarantees. Adjust to match your own projections.')
        ),
        wins.map(w=>e('details',{key:w.t},
          e('summary',null,
            e('span',{style:{display:'flex',alignItems:'center',gap:6}},
              w.t,
              w.inf&&e(InfoBtn,{text:w.inf})
            ),
            e('span',{style:{fontSize:12,color:'#9ca3af'}},w.r)
          ),
          e('div',{className:'detail-body'},
            e(PctInput,{label:'Income as % of DBO',value:w.i,onChange:w.si,info:'Range: '+w.r,min:0,max:100,step:0.5}),
            w.f.map(([lbl,val,setter,tip])=>e(PctInput,{key:lbl,label:lbl,value:val,onChange:setter,info:tip,min:0,max:100,step:0.5}))
          )
        ))
      ),

      // ── STEP 3: ANGEL GUILD ──
      (mode==='svod_only'?step===0:step===3)&&e('div',null,
        e('h2',null,'Angel Guild Streaming'),
        e('p',{className:'sub'},'Configure Angel Guild membership and viewership assumptions.'),
        e(PctInput,{label:'Viewership % in Debut Month',value:vPct,onChange:setVPct,info:'Titles reach peak viewership in first 3 months then taper off.',min:0,max:100,step:0.1}),
        e(NumInput,{label:'Angel Guild Members in Debut Month',value:gMbr,onChange:setGMbr,info:'As of December 2025, Angel Guild membership surpassed 2 million.'}),
        e(PctInput,{label:'Monthly Guild Member Growth Rate',value:gRate,onChange:setGRate,info:'March–July 2025 average growth was 8%.',min:-100,max:100,step:0.1}),
        e(PctInput,{label:'Annual Adjustment to Growth Rate',value:aAdj,onChange:setAAdj,info:'A negative value slows growth each year.',min:-100,max:100,step:0.5}),
        e(NumInput,{label:'10-Year Membership Ceiling (TAM)',value:mCeil,onChange:setMCeil,info:TIPS.tam}),
        e(NumInput,{label:'Length of Term (quarters)',value:termQtrs,onChange:v=>setTermQtrs(Math.max(1,Math.min(40,Math.round(v)))),info:'How many quarters the title will be on the Angel Guild platform. 3 mo = 1 Qtr; 1 yr = 4 Qtrs; 10 yrs = 40 Qtrs. Months beyond this term will be blanked in the SVOD schedule.'}),
        e(NumInput,{label:'Exclusive Term Length (quarters)',value:eQtrs,onChange:setEQtrs,info:'Number of quarters Angel has exclusive SVOD rights. Filmmaker payout is doubled during this window. 10 years = 40 quarters.'}),
        e(PctInput,{label:'Monthly Viewership Decay Rate',value:vDec,onChange:setVDec,info:'Viewership decays each month after the first 2 months.',min:0,max:100,step:0.5}),
        e(PctInput,{label:'Viewership Floor (months 1–60)',value:vF1,onChange:setVF1,min:0,step:0.01}),
        e(PctInput,{label:'Viewership Floor (months 61–120)',value:vF2,onChange:setVF2,min:0,step:0.01})
      ),

      // ── STEP 4: SVOD SCHEDULE ──
      (mode==='svod_only'?step===1:step===4)&&e(SvodScheduleSection,{vPct,gMbr,gRate,aAdj,mCeil,termQtrs,eQtrs,vDec,vF1,vF2}),

      // ── STEP 5: RESULTS ──
      mode!=='svod_only'&&step===5&&e(ResultsSection,{r:null,c,title,budget,gDBO,gIBO,pna,screens,revShare,mg,
        vPct,gMbr,gRate,aAdj,mCeil,vDec,vF1,vF2,printMode,doPrint,doCSV}),

      e('div',{className:'nav no-print'},
        e('button',{className:'nav-btn nav-back',disabled:step===0,
          onClick:()=>setStep(s=>Math.max(0,s-1)),
          style:{opacity:step===0?0.4:1}},'← Back'),
        e('button',{className:'nav-btn nav-next',disabled:step===activeSections.length-1,
          onClick:()=>{const next=step+1;if(mode!=='svod_only'&&next===2&&!disclaimerSeen)setShowDisclaimer(true);else setStep(s=>Math.min(activeSections.length-1,s+1));},
          style:{opacity:step===SECTIONS.length-1?0.4:1}},'Next →')
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
